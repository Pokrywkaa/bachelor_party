name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and export web apps
        run: |
          ROOT=$PWD
          mkdir -p "$ROOT/gh-pages/admin" "$ROOT/gh-pages/participant"

          cd "$ROOT/apps/admin"
          pnpm exec expo export --platform web --output-dir "$ROOT/gh-pages/admin"

          cd "$ROOT/apps/participant"
          pnpm exec expo export --platform web --output-dir "$ROOT/gh-pages/participant"

          echo "=== admin ===" && find "$ROOT/gh-pages/admin" -name "index.html"
          echo "=== participant ===" && find "$ROOT/gh-pages/participant" -name "index.html"

      - name: Create root index page
        run: |
          cat > gh-pages/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Bachelor Party Apps</title>
            <style>
              body {
                font-family: sans-serif;
                background: #0f172a;
                color: #f8fafc;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                margin: 0;
                gap: 2rem;
              }
              h1 { font-size: 2rem; margin-bottom: 0.5rem; }
              a {
                display: inline-block;
                padding: 1rem 2.5rem;
                border-radius: 0.75rem;
                text-decoration: none;
                font-size: 1.25rem;
                font-weight: 600;
                transition: opacity 0.2s;
              }
              a:hover { opacity: 0.85; }
              .admin { background: #7c3aed; color: #fff; }
              .participant { background: #0ea5e9; color: #fff; }
            </style>
          </head>
          <body>
            <h1>🎉 Bachelor Party</h1>
            <a class="admin" href="./admin/">Admin Panel</a>
            <a class="participant" href="./participant/">Participant App</a>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
